<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Luci Boutique</title>
    <link rel="icon" type="image/png" href="assets/favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Baskervville:ital@0;1&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/contact.css">
</head>
<body>

    <div id="loader">
        <div class="loader-bar-bg"><div class="loader-bar-fill"></div></div>
    </div>

    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">Luci Boutique.</a>
            <div class="nav-links">
                <a href="index.html" data-i18n="nav_home">Acasa</a>
                <a href="index.html#shop" data-i18n="nav_collection">Colectie</a>
                <a href="contact.html" class="nav-active" data-i18n="nav_contact">Contact</a>
            </div>
            <div class="nav-icons mobile-only">
                <a href="index.html" class="nav-back-link" data-i18n="nav_back_short">Inapoi</a>
            </div>
        </div>
    </nav>

    <div class="form-container">
        <h1 class="page-title" data-i18n="contact_title">Contacteaza-ne</h1>
        <p class="page-desc" data-i18n="contact_desc">
            Ai intrebari? Suntem aici sa te ajutam cu orice detaliu despre flori.
        </p>

        <div class="info-grid contact-info-grid">
            <a href="tel:+37368167766" class="info-card contact-card-link">
                <h3 data-i18n="contact_phone">Telefon</h3>
                <p class="contact-card-phone">068 167 766</p>
            </a>
            <a href="https://maps.app.goo.gl/E5h2zuHgUVXVnXNB8" target="_blank" class="info-card contact-card-link">
                <h3 data-i18n="contact_location">Locatie</h3>
                <p class="contact-card-location" data-i18n="contact_location_val">Carpineni, Moldova</p>
            </a>
        </div>

        <form id="contactForm">
            <div class="form-group">
                <label data-i18n="label_your_name">Numele Tau</label>
                <input type="text" id="contactName" data-i18n-ph="ph_your_name" placeholder="Cum te cheama?" maxlength="80" autocomplete="name" required>
            </div>
            <div class="form-group">
                <label data-i18n="label_message">Mesajul Tau</label>
                <textarea id="contactMessage" rows="5" data-i18n-ph="ph_message" placeholder="Cu ce te putem ajuta?" maxlength="1000" required></textarea>
                <div class="char-count" id="msgCount">0 / 1000</div>
            </div>
            <button type="submit" id="submitBtn" class="cta-btn submit-btn-full" data-i18n="btn_send">Trimite Mesaj</button>
            <div id="formFeedback" class="form-feedback"></div>
        </form>
    </div>

    <footer>
        <p data-i18n="footer">&copy; 2026 Floraria Carpineni.</p>
    </footer>

    <script src="js/i18n.js"></script>
    <script src="js/controls.js"></script>
    <script src="js/controls-swipe.js"></script>
    <script src="js/contact.js"></script>
</body>
</html>
