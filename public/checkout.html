<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="assets/favicon.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finalizare Comanda - Luci Boutique</title>
    <meta name="description" content="Finalizează comanda ta la Luci Boutique. Livrare rapidă, plată la livrare.">
    <meta name="robots" content="noindex">
    <link href="https://fonts.googleapis.com/css2?family=Baskervville:ital@0;1&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/checkout.css"></link>
</head>
<body>

    <div id="loader">
        <div class="loader-bar-bg"><div class="loader-bar-fill"></div></div>
    </div>

    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="logo">Luci Boutique.</a>
            <a href="/" class="nav-back-link" data-i18n="nav_back">Inapoi la magazin</a>
        </div>
    </nav>

    <div class="form-container">
        <h1 class="page-title" data-i18n="checkout_title">Finalizare Comanda</h1>

        <div class="order-summary">
            <h3><span data-i18n="checkout_total">Total de plata:</span> <span id="checkout-total" class="total-amount">0 MDL</span></h3>
            <p class="payment-note" data-i18n="checkout_payment">Plata se face la livrare (ramburs).</p>
        </div>

        <form id="checkout-form" class="checkout-form-box">
            <div class="form-group">
                <label data-i18n="label_name">Nume Prenume</label>
                <input type="text" id="name" required maxlength="80" autocomplete="name" data-i18n-ph="ph_name" placeholder="Ex: Ion Popescu">
            </div>
            <div class="form-group">
                <label data-i18n="label_phone">Telefon</label>
                <input type="tel" id="phone" required maxlength="15" minlength="8" autocomplete="tel" data-i18n-ph="ph_phone" placeholder="069 123 456"
                    oninput="this.value = this.value.replace(/[^0-9+\s\-]/g, '').slice(0,15)">
            </div>
            <div class="form-group">
                <label data-i18n="label_email">Email (Optional)</label>
                <input type="email" id="email" maxlength="120" autocomplete="email" data-i18n-ph="ph_email" placeholder="ion@email.com">
            </div>
            <div class="form-group">
                <label data-i18n="label_address">Adresa de Livrare</label>
                <textarea id="address" rows="3" required maxlength="300" data-i18n-ph="ph_address" placeholder="Strada, Numar, Oras..."></textarea>
            </div>
            <button type="submit" id="submitBtn" class="cta-btn submit-btn-full" data-i18n="btn_submit">Trimite Comanda</button>
            <div id="formFeedback" class="form-feedback"></div>
        </form>
    </div>

    <script src="js/i18n.js"></script>
    <script src="js/controls.js"></script>
    <script src="js/controls-swipe.js"></script>
    <script src="js/checkout.js"></script>
</body>
</html>
